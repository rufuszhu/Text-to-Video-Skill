<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Article Video Producer workflow</title>
  <desc id="desc">A six-step workflow from source text to conversational script, Qwen3-TTS narration, SRT subtitles, visual storyboard, generated images, and a final video package.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f80ed"/>
      <stop offset="100%" stop-color="#16a085"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,7 L2,12 Z" fill="#506477"/>
    </marker>
    <filter id="shadow" x="-12%" y="-20%" width="124%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#102030" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 44px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172433; letter-spacing: 0; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526170; letter-spacing: 0; }
      .step { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172433; letter-spacing: 0; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: 0; }
      .body { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #405060; letter-spacing: 0; }
      .small { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #587083; letter-spacing: 0; }
      .gate { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #7b4a00; letter-spacing: 0; }
      .mono { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #314154; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #d8e2ea; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .iconCircle { fill: #edf5ff; stroke: #c8def5; stroke-width: 1.5; }
      .arrow { stroke: #506477; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .softArrow { stroke: #92a1af; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-dasharray: 7 8; }
    </style>
  </defs>

  <rect width="1400" height="620" fill="url(#bg)"/>
  <rect x="48" y="42" width="1304" height="536" rx="30" fill="#ffffff" opacity="0.62" stroke="#dfe8ef"/>

  <text class="title" x="86" y="105">Article Video Producer</text>
  <text class="subtitle" x="88" y="137">Turn an article or Markdown note into a narrated video package with voice, subtitles, images, and review gates.</text>

  <rect x="1010" y="72" width="250" height="44" rx="22" fill="url(#accent)"/>
  <text class="label" x="1042" y="100">final.mp4 + final.srt</text>

  <!-- Step cards -->
  <g transform="translate(78,188)">
    <rect class="card" x="0" y="0" width="190" height="236" rx="18"/>
    <circle class="iconCircle" cx="44" cy="42" r="24"/>
    <path d="M34 28 h24 l10 10 v30 H34 Z M58 28 v11 h10" fill="none" stroke="#2f80ed" stroke-width="3" stroke-linejoin="round"/>
    <text class="step" x="24" y="91">Source Text</text>
    <text class="body" x="24" y="125">Article, essay,</text>
    <text class="body" x="24" y="146">or Markdown note</text>
    <text class="mono" x="24" y="181">original.md</text>
    <text class="small" x="24" y="209">Language detected</text>
  </g>

  <path class="arrow" d="M282 306 H326"/>

  <g transform="translate(340,188)">
    <rect class="card" x="0" y="0" width="190" height="236" rx="18"/>
    <circle class="iconCircle" cx="44" cy="42" r="24"/>
    <path d="M32 40 h24 M32 52 h38 M32 64 h30 M62 31 l13 13 l-28 28 l-14 4 l4-14 Z" fill="none" stroke="#16a085" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="step" x="24" y="91">Conversational</text>
    <text class="step" x="24" y="119">Script</text>
    <text class="body" x="24" y="153">Preserve structure,</text>
    <text class="body" x="24" y="174">make it speakable</text>
    <text class="mono" x="24" y="209">spoken_script.md</text>
  </g>

  <path class="arrow" d="M544 306 H588"/>

  <g transform="translate(602,188)">
    <rect class="card" x="0" y="0" width="190" height="236" rx="18"/>
    <circle class="iconCircle" cx="44" cy="42" r="24"/>
    <path d="M35 42 h9 l12-12 v46 L44 64 h-9 Z M66 39 c6 6 6 24 0 30 M75 32 c12 14 12 36 0 50" fill="none" stroke="#7c5cff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="step" x="24" y="91">Qwen3-TTS</text>
    <text class="step" x="24" y="119">Voice</text>
    <text class="body" x="24" y="153">Model voice or</text>
    <text class="body" x="24" y="174">consent voice clone</text>
    <text class="mono" x="24" y="209">narration.wav</text>
  </g>

  <path class="arrow" d="M806 306 H850"/>

  <g transform="translate(864,188)">
    <rect class="card" x="0" y="0" width="190" height="236" rx="18"/>
    <circle class="iconCircle" cx="44" cy="42" r="24"/>
    <rect x="28" y="31" width="42" height="28" rx="5" fill="none" stroke="#f39c12" stroke-width="3"/>
    <path d="M34 66 h34 M34 77 h24 M38 43 h22" fill="none" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
    <text class="step" x="24" y="91">Subtitles</text>
    <text class="step" x="24" y="119">and QC</text>
    <text class="body" x="24" y="153">Align to audio,</text>
    <text class="body" x="24" y="174">check text timing</text>
    <text class="mono" x="24" y="209">final.srt</text>
  </g>

  <path class="arrow" d="M1068 306 H1112"/>

  <g transform="translate(1126,188)">
    <rect class="card" x="0" y="0" width="190" height="236" rx="18"/>
    <circle class="iconCircle" cx="44" cy="42" r="24"/>
    <rect x="27" y="29" width="46" height="34" rx="5" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <path d="M31 59 l13-13 l10 9 l7-8 l10 12 M38 36 h10" fill="none" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="step" x="24" y="91">Visual</text>
    <text class="step" x="24" y="119">Storyboard</text>
    <text class="body" x="24" y="153">Scene prompts,</text>
    <text class="body" x="24" y="174">consistent images</text>
    <text class="mono" x="24" y="209">scene_###.png</text>
  </g>

  <!-- Final card below the main flow -->
  <path class="softArrow" d="M1220 438 C1220 492 1110 500 1008 500 H880"/>

  <g transform="translate(624,454)">
    <rect x="0" y="0" width="240" height="74" rx="18" fill="#172433" filter="url(#shadow)"/>
    <path d="M30 22 v30 l25-15 Z" fill="#ffffff"/>
    <text class="label" x="76" y="32">Final Video Package</text>
    <text class="small" x="76" y="56" fill="#d7e6f3">No burned-in captions</text>
  </g>

  <!-- Review gate band -->
  <rect x="88" y="468" width="430" height="70" rx="18" fill="#fff6e5" stroke="#f0cf92"/>
  <path d="M118 503 h36 M136 485 v36 M166 503 h70 M256 503 h70 M346 503 h70" stroke="#c67d00" stroke-width="3" stroke-linecap="round"/>
  <text class="gate" x="118" y="492">Human review gates</text>
  <text class="body" x="118" y="520">Approve script, then approve image plan before generation.</text>

  <rect x="920" y="468" width="330" height="70" rx="18" fill="#eaf7f3" stroke="#b9ded4"/>
  <text class="gate" x="950" y="492" fill="#0f6655">Reusable CLI pipeline</text>
  <text class="body" x="950" y="520">Bundled scripts for TTS, SRT reflow, contact sheet, and ffmpeg render.</text>
</svg>
